<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>礼品兑换</title>
    <link rel="stylesheet" href="/styles/h5.css">
</head>
<body>
    <div class="container">
        <!-- 左上角返回按钮 -->
        <button id="backBtn" class="btn-back">‹</button>
        
        <div class="header">
            <h1>老乡鸡1314供应商大会礼品兑换</h1>
        </div>

        <!-- 礼品展示部分 -->
        <!--<div class="gift-section" style="display: none;">
            <div class="gift-image">
                <img src="/styles/gift-image.jpg" >
            </div>
            <div class="gift-description">
                <p>感谢您参加老乡鸡25年供应商大会！请输入您的兑换码领取专属礼品。</p>
                <p></p>
            </div>
        </div>
        -->

        <!-- 兑换码验证部分 -->
        <div id="codeVerification" class="section active">
            <div class="form-group">
                <label for="redemptionCode">兑换码</label>
                <input type="text" id="redemptionCode" placeholder="请输入礼品卡上的兑换码" maxlength="10" autocomplete="off">
                <div id="codeError" class="error-message"></div>
            </div>
            <button id="verifyBtn" class="btn-primary">立刻兑换</button>
        </div>

        <!-- 收货信息表单部分 -->
        <div id="shippingForm" class="section">
            <h2>请如实填写收货信息，礼品将尽快发货</h2>
            
            <div class="form-group">
                <label for="company">公司名称 <span class="required">*</span></label>
                <input type="text" id="company" placeholder="请输入公司名称，便于联系" required>
            </div>
            <div class="form-group">
                <label for="name">姓名 *</label>
                <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>

            <div class="form-group">
                <label for="phone">手机号 <span class="required">*</span></label>
                <input type="tel" id="phone" placeholder="请输入您的手机号" required maxlength="11">
            </div>

            <div class="form-group">
                <label for="province">省份 <span class="required">*</span></label>
                <select id="province" required>
                    <option value="">请选择省份</option>
                </select>
            </div>

            <div class="form-group">
                <label for="city">城市 <span class="required">*</span></label>
                <select id="city" required disabled>
                    <option value="">请选择城市</option>
                </select>
            </div>

            <div class="form-group">
                <label for="district">区县 <span class="required">*</span></label>
                <select id="district" required disabled>
                    <option value="">请选择区县</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">详细地址 <span class="required">*</span></label>
                <textarea id="address" placeholder="请输入详细收货地址" rows="3" required></textarea>
            </div>

            <div class="form-actions">
                <button id="submitBtn" class="btn-primary">提交</button>
            </div>

            <div id="formError" class="error-message"></div>
        </div>

        <!-- 提交成功部分 -->
        <div id="successMessage" class="section">
            <div class="success-icon">✓</div>
            <h2>提交成功！</h2>
            <p>您的礼品兑换申请已提交，我们将尽快为您安排发货。</p>
            <p>如有疑问，请拨打客服电话：4007661777。</p>
        </div>
    </div>

    <script src="/scripts/h5.js"></script>
</body>
</html>
